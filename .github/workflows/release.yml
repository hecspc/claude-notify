name: Release

on:
  push:
    branches: [main]
    paths:
      - Cargo.toml

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Get current version
        id: version
        run: |
          version=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Check if version changed
        id: check
        run: |
          prev_version=$(git show HEAD~1:Cargo.toml 2>/dev/null | grep '^version' | head -1 | sed 's/.*"\(.*\)"/\1/' || echo "")
          curr_version=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ "$prev_version" != "$curr_version" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: claude-notify-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: claude-notify-macos-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: claude-notify-macos-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: claude-notify-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Package binary (unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/claude-notify ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}
      - name: Package binary (windows)
        if: runner.os == 'Windows'
        run: cp target/${{ matrix.target }}/release/claude-notify.exe ${{ matrix.artifact }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: [check-version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Extract changelog for this version
        id: changelog
        run: |
          version="${{ needs.check-version.outputs.version }}"
          # Extract the section for this version from CHANGELOG.md
          # Matches from "## [version]" until the next "## [" or end of file
          changelog=$(awk "/^## \\[$version\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md)
          # If no versioned section found, try [Unreleased]
          if [ -z "$changelog" ]; then
            changelog=$(awk '/^## \[Unreleased\]/{found=1; next} /^## \[/{if(found) exit} found{print}' CHANGELOG.md)
          fi
          # Write to file to preserve multiline content
          echo "$changelog" > /tmp/release-notes.md
      - name: Create tag
        run: |
          version="v${{ needs.check-version.outputs.version }}"
          git tag "$version"
          git push origin "$version"
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="v${{ needs.check-version.outputs.version }}"
          gh release create "$version" \
            --title "$version" \
            --notes-file /tmp/release-notes.md \
            artifacts/claude-notify-linux-x86_64/claude-notify-linux-x86_64 \
            artifacts/claude-notify-macos-aarch64/claude-notify-macos-aarch64 \
            artifacts/claude-notify-macos-x86_64/claude-notify-macos-x86_64 \
            artifacts/claude-notify-windows-x86_64.exe/claude-notify-windows-x86_64.exe
